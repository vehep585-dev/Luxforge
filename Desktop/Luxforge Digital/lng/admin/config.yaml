backend:
  name: git-gateway
  branch: main # Change to 'master' if your GitHub uses master

media_folder: "images"
public_folder: "/images"

collections:
  # 1. SETTINGS (Email, WhatsApp, Global Info)
  - name: "settings"
    label: "Global Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "contact"
        label: "Contact Information"
        file: "content/settings/contact.json"
        fields:
          - { label: "Business Email", name: "email", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "Location/Address", name: "address", widget: "string" }

  # 2. PAGES (Headline, Subtext, Services)
  - name: "pages"
    label: "Page Content"
    files:
      - name: "home"
        label: "Homepage"
        file: "content/pages/home.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_text", widget: "text" }
          - { label: "Service 1 Description", name: "service_1", widget: "text" }
          - { label: "Service 2 Description", name: "service_2", widget: "text" }